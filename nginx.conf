events {}

http {
    # Ya incluye todos los tipos (css, js, etc), no necesitas el bloque 'types' manual
    include       mime.types;
    default_type  application/octet-stream;

    # Si no tienes archivos en vhosts/, puedes comentar esta línea
    # include vhosts/*.conf;

    # Redirección de HTTP a HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Frontend
        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
        }

        # Backend (Spring Boot)
        location /api/ {
            # Importante: el nombre 'server' debe coincidir con el nombre del servicio en docker-compose.yml
            proxy_pass http://server:9090/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS
            add_header 'Access-Control-Allow-Origin' 'https://localhost' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        }
    }
}