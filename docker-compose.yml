services:
  web:
    image: nginx
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./React/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl/nginx.crt:/etc/nginx/ssl/nginx.crt
      - ./ssl/nginx.key:/etc/nginx/ssl/nginx.key
    depends_on:
      - server

  db:
    image: mysql:oraclelinux9
    container_name: db_alas_cristal
    command: --lower_case_table_names=1
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: alas_de_cristal
      TZ: "Europe/Madrid"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./BBDD/Pajareria.sql:/docker-entrypoint-initdb.d/init.sql

  server:
      environment:
      - TZ=Europe/Madrid
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/alas_de_cristal?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      build: 
        context: ./Servidor/TiendaPajaros
        dockerfile: ./Dockerfile
      ports:
      - 9090:9090
      depends_on:
       db:
        condition: service_healthy